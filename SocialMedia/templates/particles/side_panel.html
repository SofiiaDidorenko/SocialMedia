{% load static %}

<div class="side-panel">
    <div class="profile-container">
        <div class="profile-head">
            <div class="profile-picture">
              
                <img src="{% static 'icons/example-photo.png' %}" alt="Profile Picture">
            </div>
            <div class="profile-name">
            
                <h3>
                    {% if request.user.first_name %}
                        {{ request.user.first_name }}
                    {% else %}
                        Новий користувач
                    {% endif %}
                </h3>
               
                <p>@{{ request.user.username }}</p>
            </div>
        </div>
        <div class="profile-info">
            <div class="info-container">
                <h3>566</h3>                       
                <p>Дописи</p>
            </div>
            <div class="info-container">
                <h3>12.1K</h3>                                
                <p>Читачі</p>
            </div>
            <div class="info-container">
                <h3>222</h3>                   
                <p>Друзі</p>
            </div>
        </div>
    </div>
    <div class="request">
        <nav>
            <h3>Запити</h3>
            <a href="{% url 'friends' %}">Дивитися всі</a>
        </nav>
    </div>
    <div class="message-block">
        <nav>
            <h3>Повідомлення</h3>
            <a href="#">Дивитися всі</a>
        </nav>
    </div>
</div>
