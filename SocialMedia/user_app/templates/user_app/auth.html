{% extends 'base.html' %} <!-- ОБЯЗАТЕЛЬНО ПЕРВОЙ СТРОКОЙ -->
{% load static %}

{% block title %}Register{% endblock %}

{% block links %}
    <link rel="stylesheet" href="{% static 'user_app/css/auth.css' %}">
{% endblock links %}

{% block content %}
    <div class="auth-container">
        <div class="auth-section">
            <form method="post", action="{% url 'register' %}" class="auth-form">
                {% csrf_token %}
                
                {{ register_form.as_p }}
                <button type="submit">Зареєструватися</button>
            </form>
        </div>
        
    </div>
{% endblock %}
