{% load static %}
<div id="post-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Створення публікації</h2>
            <span class="close-btn" id="close-post-modal">&times;</span>
        </div>
        <form id="create-post-form" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group"><label>Назва публікації</label>{{ form.title }}</div>
            <div class="form-group"><label>Тема публікації</label>{{ form.topic }}</div>
            
            <div class="tags-selection" id="tags-container">
                {% for tag in tags %}
                    <div class="tag-badge" data-id="{{ tag.id }}">#{{ tag.name }}</div>
                {% endfor %}
                <button type="button" class="icon-only-btn" id="open-tag-modal">
                    <img src="{% static 'icons/plus-circle.png' %}">
                </button>
            </div>

            {{ form.content }}

            <div class="form-group link-group" style="margin-top: 20px;">
                <label>Посилання</label>
                <div class="link-wrapper">
                    <input type="url" name="links" placeholder="https://..." class="link-input">
                    <button type="button" class="icon-only-btn">
                        <img src="{% static 'icons/plus-circle.png' %}">
                    </button>
                </div>
            </div>


            <div id="image-preview-container" class="image-preview-grid"></div>

            <div class="modal-footer">
                <div class="footer-actions-group">
                    <label class="icon-only-btn1" style="cursor: pointer;">
                        <input type="file" id="file-input" name="image" multiple accept="image/*" style="display:none;">
                        <img src="{% static 'icons/photo.png' %}" alt="Фото">
                    </label>
                    <button type="button" class="icon-only-btn1">
                        <img src="{% static 'icons/emoji.png' %}" alt="Емодзі">
                    </button>
                    <button type="submit" class="btn-submit-post">
                        
                        <img src="{% static 'icons/send.png' %}" >
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
